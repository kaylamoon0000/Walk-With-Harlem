<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Walk Harlem</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<style>
body{margin:0;font-family:Inter;background:#f4f8fc}
.hidden{display:none}
#loginOverlay{position:fixed;inset:0;background:#0006;display:flex;align-items:center;justify-content:center}
.card{background:white;padding:30px;border-radius:20px;width:400px}
button{padding:10px 15px;margin-top:10px;cursor:pointer}
#map{height:100vh}
</style>
</head>

<body>

<div id="loginOverlay">
<div class="card">
<h2>Login</h2>

<button onclick="setRole('walker')">Walker</button>
<button onclick="setRole('business')">Business</button>

<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>

<button onclick="submitLogin()">Continue</button>
<p id="msg"></p>
</div>
</div>

<div id="app" class="hidden">
<button onclick="switchRole()">Switch Role</button>
<button onclick="logout()">Logout</button>
<div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// ================= STATE =================
let accountType = "walker";
let sessionStarted = false;
let currentStep = 0;
let walkerMarker = null;
let routeLine = null;

// ================= LOGIN TYPE SWITCH =================
document.querySelectorAll("#accountTypeSwitch button").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll("#accountTypeSwitch button")
      .forEach(b => b.classList.remove("active"));

    btn.classList.add("active");
    accountType = btn.dataset.type;
  };
});

// ================= LOGIN =================
function completeAuth(profile) {
  localStorage.setItem("user", JSON.stringify(profile));
  loginOverlay.classList.add("hidden");
  applyRoleUI(profile.type);
}

// override existing auth
authSubmit.onclick = () => {
  const name = authName.value || "User";
  const email = authEmail.value;

  if (!email) {
    authStatus.className = "status red show";
    authStatus.textContent = "Enter email";
    return;
  }

  completeAuth({ name, email, type: accountType });
};

guestLogin.onclick = () => {
  completeAuth({ name: "Guest", email: "guest", type: "walker" });
};

// ================= ROLE UI =================
function applyRoleUI(role) {
  if (role === "business") {
    openPanel("businesses");
  } else {
    openPanel("platform");
  }
}

// ================= MAP =================
const map = L.map("leafletMap").setView([40.82155, -73.9487], 18);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

// ================= ROUTE =================
function buildSimpleRoute() {
  return [
    [40.82094, -73.94952],
    [40.8215, -73.9488],
    [40.8223, -73.9492],
    [40.8216, -73.9502],
    [40.82094, -73.94952]
  ];
}

// ================= RENDER MAP =================
function renderRoute() {
  if (routeLine) map.removeLayer(routeLine);

  const coords = buildSimpleRoute();

  routeLine = L.polyline(coords, {
    color: "#4b98ea",
    weight: 6
  }).addTo(map);

  walkerMarker = L.circleMarker(coords[0], {
    radius: 8,
    color: "#17324f",
    fillColor: "#17324f",
    fillOpacity: 1
  }).addTo(map);

  map.fitBounds(routeLine.getBounds(), { padding: [50,50] });
}

// ================= SMOOTH MOVEMENT =================
function moveWalkerTo(index) {
  const coords = buildSimpleRoute();
  if (!walkerMarker || index >= coords.length) return;

  const start = walkerMarker.getLatLng();
  const end = L.latLng(coords[index]);

  let t = 0;

  function animate() {
    t += 0.02;

    const lat = start.lat + (end.lat - start.lat) * t;
    const lng = start.lng + (end.lng - start.lng) * t;

    walkerMarker.setLatLng([lat, lng]);

    if (t < 1) requestAnimationFrame(animate);
  }

  animate();
}

// ================= SESSION =================
document.getElementById("startWalk").onclick = () => {
  sessionStarted = true;
  currentStep = 0;
  renderRoute();
};

document.getElementById("buildRoute").onclick = () => {
  renderRoute();
};

document.getElementById("resetWalk").onclick = () => {
  location.reload();
};

// ================= CLICK STOPS =================
document.addEventListener("click", (e) => {
  if (!sessionStarted) return;

  if (e.target.closest(".stop-card")) {
    currentStep++;
    moveWalkerTo(currentStep);
  }
});

</script>

</body>
</html>
