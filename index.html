<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Walk-to-Earn Harlem</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{
  margin:0;
  font-family:Inter;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
}

.header{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
}

.button{
  padding:10px 16px;
  border-radius:10px;
  background:#3b82f6;
  border:none;
  color:white;
  cursor:pointer;
}

.container{
  padding:30px;
}

.card{
  background:rgba(255,255,255,0.05);
  border-radius:16px;
  padding:20px;
  margin-bottom:20px;
}

.grid{
  display:grid;
  grid-template-columns:300px 1fr 300px;
  gap:20px;
}

#map{
  height:600px;
  border-radius:16px;
}

.stop{
  padding:10px;
  border-radius:10px;
  background:rgba(255,255,255,0.05);
  margin-bottom:10px;
  cursor:pointer;
}

.auth{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0f172a;
}

.auth-box{
  width:320px;
  background:#1e293b;
  padding:20px;
  border-radius:16px;
}

input,select{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

.hidden{display:none}

</style>
</head>

<body>

<div id="auth" class="auth">
  <div class="auth-box">
    <h2>Login</h2>
    <input placeholder="Email">
    <input placeholder="Password" type="password">
    <select id="role">
      <option value="walker">Walker</option>
      <option value="business">Business</option>
    </select>
    <button class="button" onclick="enterApp()">Enter</button>
  </div>
</div>

<div id="app" class="hidden">

<div class="header">
  <h2>Walk-to-Earn Harlem</h2>
  <div>
    <button class="button" onclick="buildRoute()">Build Route</button>
    <button class="button" onclick="startWalk()">Start</button>
  </div>
</div>

<div class="container">

<div class="grid">

<div class="card">
<h3>Route Settings</h3>
<select id="time">
<option>10</option>
<option selected>20</option>
<option>40</option>
</select>

<select id="type">
<option value="food">Food</option>
<option value="mixed">Mixed</option>
</select>
</div>

<div class="card">
<div id="map"></div>
</div>

<div class="card">
<h3>Stops</h3>
<div id="stops"></div>
</div>

</div>

<div class="card">
<h3>Business Dashboard</h3>
<div id="business"></div>
</div>

</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let map=L.map('map').setView([40.8215,-73.9487],18);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markers=[];
let line;

let routes=[
  [
    {name:'Start',lat:40.8209,lng:-73.9495},
    {name:'Cafe',lat:40.8213,lng:-73.9490},
    {name:'Shop',lat:40.8218,lng:-73.9482},
    {name:'End',lat:40.8222,lng:-73.9475}
  ],
  [
    {name:'Start',lat:40.8209,lng:-73.9495},
    {name:'Books',lat:40.8216,lng:-73.9480},
    {name:'Food',lat:40.8217,lng:-73.9486},
    {name:'End',lat:40.8212,lng:-73.9478}
  ]
];

let currentRoute=[];
let step=0;

function enterApp(){
  document.getElementById('auth').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
}

function clearMap(){
  markers.forEach(m=>map.removeLayer(m));
  markers=[];
  if(line)map.removeLayer(line);
}

function buildRoute(){
  clearMap();
  currentRoute=routes[Math.floor(Math.random()*routes.length)];
  let coords=[];

  currentRoute.forEach((p,i)=>{
    let m=L.marker([p.lat,p.lng]).addTo(map).bindPopup(p.name);
    markers.push(m);
    coords.push([p.lat,p.lng]);
  });

  line=L.polyline(coords).addTo(map);
  map.fitBounds(line.getBounds());

  renderStops();
}

function renderStops(){
  let div=document.getElementById('stops');
  div.innerHTML='';
  currentRoute.forEach((s,i)=>{
    let el=document.createElement('div');
    el.className='stop';
    el.innerText=s.name;
    el.onclick=()=>hitStop(i);
    div.appendChild(el);
  });
}

function startWalk(){
  step=0;
  alert('Walk started');
}

function hitStop(i){
  if(i!==step){alert('Wrong stop');return;}
  alert('Stop '+i+' complete');
  step++;
}

</script>

</body>
</html>
