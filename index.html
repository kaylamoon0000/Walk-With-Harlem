<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Walk</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{
margin:0;
font-family:Inter, system-ui;
background:#0f172a;
color:white;
}

/* AUTH SCREEN */
#authScreen{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:radial-gradient(circle at top,#2563eb,#020617);
}

.card{
width:420px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
border-radius:20px;
padding:30px;
box-shadow:0 20px 80px rgba(0,0,0,0.6);
}

h2{
margin-bottom:15px;
font-weight:600;
}

/* TABS */
.tabs{
display:flex;
gap:10px;
margin-bottom:12px;
}

.tabs button{
flex:1;
padding:10px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.1);
color:white;
cursor:pointer;
transition:0.2s;
}

.tabs .active{
background:#2563eb;
}

/* INPUT */
input{
width:100%;
padding:12px;
margin:6px 0;
border-radius:10px;
border:none;
background:rgba(255,255,255,0.1);
color:white;
}

/* BUTTON */
.mainBtn{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-weight:600;
cursor:pointer;
}

#msg{margin-top:10px;color:#f87171}

/* APP */
#app{display:none;}

#top{
display:flex;
gap:10px;
padding:15px;
background:#020617;
border-bottom:1px solid rgba(255,255,255,0.1);
}

select,button{
padding:10px;
border-radius:8px;
border:none;
}

#map{
height:90vh;
}
</style>
</head>

<body>

<div id="authScreen">
<div class="card">

<h2 id="title">Login (Walker)</h2>

<div class="tabs">
<button id="walkerBtn" class="active">Walker</button>
<button id="businessBtn">Business</button>
</div>

<div class="tabs">
<button id="loginTab" class="active">Sign In</button>
<button id="signupTab">Create</button>
</div>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<div id="extra" style="display:none;">
<input id="name" placeholder="Name">
<input id="biz" placeholder="Business Name">
</div>

<button class="mainBtn" id="submit">Continue</button>
<p id="msg"></p>

</div>
</div>

<div id="app">

<div id="top">
<select id="time">
<option value="10">10 min</option>
<option value="20">20 min</option>
<option value="40">40 min</option>
</select>

<select id="mode">
<option value="walk">Walk</option>
<option value="run">Run</option>
</select>

<button id="build">Build</button>
<button id="logout">Logout</button>

<h3 id="routeTitle">Route</h3>
</div>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

let role="walker";
let mode="login";

function updateUI(){
title.innerText=(mode==="login"?"Login":"Create")+" ("+role+")";
extra.style.display=mode==="signup"?"block":"none";

walkerBtn.classList.toggle("active",role==="walker");
businessBtn.classList.toggle("active",role==="business");

loginTab.classList.toggle("active",mode==="login");
signupTab.classList.toggle("active",mode==="signup");
}

walkerBtn.onclick=()=>{role="walker";updateUI();}
businessBtn.onclick=()=>{role="business";updateUI();}
loginTab.onclick=()=>{mode="login";updateUI();}
signupTab.onclick=()=>{mode="signup";updateUI();}

submit.onclick=()=>{

let e=email.value.trim();
let p=password.value.trim();

let users=JSON.parse(localStorage.getItem("users")||"{}");

if(mode==="signup"){
users[e]={password:p,role:role};
localStorage.setItem("users",JSON.stringify(users));
msg.innerText="Account created";
mode="login";
updateUI();
return;
}

if(!users[e]||users[e].password!==p){
msg.innerText="Invalid login";
return;
}

role=users[e].role;

authScreen.style.display="none";
app.style.display="block";
};

logout.onclick=()=>location.reload();

/* MAP */
let map=L.map('map').setView([40.821,-73.949],17);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let route;

function generate(t,m){
let s=t/10;
if(m==="run")s*=1.6;

return [
[40.821,-73.949],
[40.821+0.0003*s,-73.949+0.0005*s],
[40.821+0.0007*s,-73.949+0.0002*s],
[40.821+0.0004*s,-73.949-0.0004*s],
[40.821,-73.949]
];
}

build.onclick=()=>{
let pts=generate(time.value,mode.value);

if(route)map.removeLayer(route);

route=L.polyline(pts,{color:"#3b82f6",weight:5}).addTo(map);

routeTitle.innerText=`${time.value} min ${mode.value}`;

map.fitBounds(route.getBounds());
};

updateUI();

</script>

</body>
</html>
